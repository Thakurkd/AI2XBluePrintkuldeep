<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Auto-Apply Report</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { color: #0a66c2; border-bottom: 2px solid #0a66c2; padding-bottom: 10px; }
        .success { color: #155724; background-color: #d4edda; border: 1px solid #c3e6cb; padding: 15px; border-radius: 4px; margin-bottom: 20px; font-weight: bold; }
        .details { background-color: #f8f9fa; border: 1px solid #e9ecef; padding: 20px; border-radius: 4px; }
        .details h2 { margin-top: 0; color: #495057; }
        .details table { width: 100%; border-collapse: collapse; }
        .details th, .details td { text-align: left; padding: 10px; border-bottom: 1px solid #dee2e6; }
        .details th { width: 30%; color: #495057; }
    </style>
</head>
<body>
    <h1>LinkedIn Auto-Apply Agent Report</h1>
    
    <div class="success">
        ✅ Application Submitted Successfully
    </div>

    <div class="details">
        <h2>Job Details</h2>
        <table>
            <tr>
                <th>Job Title</th>
                <td>Quality Assurance Engineer | $80/hr Remote</td>
            </tr>
            <tr>
                <th>Company</th>
                <td>Crossing Hurdles</td>
            </tr>
            <tr>
                <th>Location</th>
                <td>Remote</td>
            </tr>
            <tr>
                <th>Resume Uploaded</th>
                <td>Kd resume.docx</td>
            </tr>
            <tr>
                <th>Status</th>
                <td>Application sent</td>
            </tr>
            <tr>
                <th>Timestamp</th>
                <td><script>document.write(new Date().toLocaleString());</script></td>
            </tr>
        </table>
    </div>
</body>
</html>
